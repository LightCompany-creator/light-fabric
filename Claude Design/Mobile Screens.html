<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightFlow · Мобильная версия — 4 экрана</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: 'Inter', system-ui, sans-serif; background: #EEF1F6; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #C8D1DE; border-radius: 3px; }
  button:hover { filter: brightness(1.04); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mobile-screens.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  // Simple phone-shaped frame around the screen
  function Phone({ children, dark }) {
    return (
      <div style={{
        width: 390, height: 844, borderRadius: 46,
        background: '#0F1B2D', padding: 12, boxSizing: 'border-box',
        boxShadow: '0 30px 60px -20px rgba(15,27,45,0.45), 0 10px 24px -10px rgba(15,27,45,0.3)',
        position: 'relative',
      }}>
        <div style={{
          width: '100%', height: '100%', borderRadius: 36,
          background: 'white', overflow: 'hidden', position: 'relative',
        }}>
          {/* Dynamic island */}
          <div style={{
            position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
            width: 124, height: 34, borderRadius: 24,
            background: '#000', zIndex: 50,
          }}></div>
          {children}
        </div>
      </div>
    );
  }

  function App() {
    return (
      <window.DesignCanvas title="LightFlow · Мобильная версия" subtitle="Адаптация для смартфона · ширина 390px · бригадир, директор, бухгалтер">
        <window.DCSection id="auth" title="Авторизация · общий вход">
          <window.DCArtboard id="login" label="Вход по табельному + PIN" width={414} height={868}>
            <Phone><window.LoginScreen /></Phone>
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="foreman" title="Бригадир — основной экран">
          <window.DCArtboard id="foreman-home" label="Главная · смена активна" width={414} height={868}>
            <Phone><window.ForemanScreen /></Phone>
          </window.DCArtboard>
          <window.DCArtboard id="batch-card" label="Карточка партии · в работе" width={414} height={868}>
            <Phone><window.BatchCard /></Phone>
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="director" title="Директор — дашборд">
          <window.DCArtboard id="director-dash" label="Сводка по заводу" width={414} height={868}>
            <Phone><window.DirectorScreen /></Phone>
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
