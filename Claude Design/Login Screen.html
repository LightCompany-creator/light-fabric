<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightFlow · Экран входа</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Inter', system-ui, sans-serif; background: #EEF2F8; }
  @keyframes lf-spin { to { transform: rotate(360deg); } }
  /* Make canvas frames feel like real browser windows */
  .lf-frame {
    width: 100%;
    height: 100%;
    background: white;
    overflow: hidden;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="login-screen.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  function App() {
    return (
      <window.DesignCanvas title="LightFlow · Экран входа" subtitle="3 состояния · 1280 × 800">
        <window.DCSection id="states" title="Состояния авторизации">
          <window.DCArtboard id="default" label="01 · По умолчанию" width={1280} height={800}>
            <div className="lf-frame">
              <window.LoginScreen variant="default" stateTagText="DEFAULT" />
            </div>
          </window.DCArtboard>
          <window.DCArtboard id="error" label="02 · Ошибка авторизации" width={1280} height={800}>
            <div className="lf-frame">
              <window.LoginScreen variant="error" stateTagText="ERROR" />
            </div>
          </window.DCArtboard>
          <window.DCArtboard id="loading" label="03 · Загрузка (вход)" width={1280} height={800}>
            <div className="lf-frame">
              <window.LoginScreen variant="loading" stateTagText="LOADING" />
            </div>
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
